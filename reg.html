<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>REGISTRATION</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="css/style0.css">
	<link rel="stylesheet" href="css/header-footer.css">
</head>

<body>

    <div class="header">
				<div class="header__section">
					<div class="header__item headerButton"><a href="history.html">история</a></div>
					<div class="header__item headerButton"><a href="reg.html">профиль</a></div>
					<div class="header__item header__logo">
						<a href="index.html"><img src="image/logo.png" alt="Логотип" class="logo"></a>
					</div>
					<div class="header__item headerButton">
						<form action="search_results.html" method="get">
							<input type="text" name="query" placeholder="поиск" class="search-input">
						</form>
					</div>
					<div class="header__item headerButton"><a href="cart.html">корзина</a></div>
				</div>
			</div>

<main class="flex-grow-1 d-flex align-items-center justify-content-center" style="position: relative;">

    <img src="image/imageSQR1.png" class="mx-auto d-block" alt="imagesqr" style="max-width: 100%; height: auto;">

    <form id="loginForm" action="index.html" class="flex-grow-1" style="position: absolute; inset: 0; font-family: 'Helvetica', Arial, sans-serif; z-index: 10;">
        <div class="d-flex flex-column" style="position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);">
            <div class="mb-3">
                <label for="firstName" class="form-label visually-hidden">Имя</label>
                <input type="text" name="firstName" class="form-control" id="firstName" placeholder="имя" style="text-align: center; color:black;" required>
            </div>
            <div class="mb-3">
                <label for="lastName" class="form-label visually-hidden">Фамилия</label>
                <input type="text" name="lastName" class="form-control" id="lastName" placeholder="фамилия" style="text-align: center; color:black;" required>
            </div>
        </div>

        <div class="d-flex flex-column" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <div class="mb-3">
                <label for="email" class="form-label visually-hidden">Email</label>
                <input type="email" name="email" class="form-control" id="email" placeholder="email" style="text-align: center; color:black;" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label visually-hidden">Телефон</label>
                <input type="tel" name="phone" class="form-control" id="phone" placeholder="телефон" style="text-align: center; color:black;" required>
            </div>
        </div>

        <button id="loginButton" type="submit" class="btn btn-primary" style="position: absolute; top: 75%; left: 50%; transform: translate(-50%, -50%); background-color:black; border-color: black;" disabled>вход</button>
    </form>

</main>


    <div class="footer">
				<div class="footer__section">
					<div class="footer__item"><a href="contact.html">контакты</a></div>
					<div class="footer__item"><a href="news.html">новости</a></div>
					<div class="footer__item"><p></p></div>
					<div class="footer__item"><p></p></div>
					<div class="footer__item"><p>&copy; 2024 BYNIKITADENISOV︱RIGHTS RESERVED</p></div>
				</div>
			</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
	
<script>

	function checkForm() {
		const inputs = document.querySelectorAll('input[required]');
		let allFilled = Array.from(inputs).every(input => input.value.trim() !== "");

		const button = document.getElementById('loginButton');
		button.disabled = !allFilled;
	}

	document.querySelectorAll('input[required]').forEach(input => {
		input.addEventListener('input', checkForm);
	});

	checkForm();
	  
</script>

</body>
</html>
