		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const header = document.querySelector('.header');
				const heroVideo = document.querySelector('.hero-video');
				const headerItems = document.querySelectorAll('.header .header__item');

				function updateHeaderState() {
					if (!header || !heroVideo) return;

					const heroBottom = heroVideo.getBoundingClientRect().bottom;
					const headerBottom = header.getBoundingClientRect().bottom;

					// Белая подложка и чёрная линия появляются, когда хедер уже вышел ниже видеоблока.
					header.classList.toggle('header--solid', heroBottom <= headerBottom);

					headerItems.forEach(function (item) {
						const itemRect = item.getBoundingClientRect();
						const itemCenter = itemRect.top + itemRect.height / 2;
						const isOverVideo = itemCenter < heroBottom;

						item.classList.toggle('is-over-video', isOverVideo);
						item.classList.toggle('is-below-video', !isOverVideo);
					});
				}

				updateHeaderState();
				window.addEventListener('scroll', updateHeaderState);
				window.addEventListener('resize', updateHeaderState);

				const slider = document.querySelector('.product-slider');
				const track = document.querySelector('.product-slider__track');

				if (slider && track) {
					const originalSlides = Array.from(track.children);
					let originalWidth = 0;
					let isDown = false;
					let startX = 0;
					let scrollLeft = 0;
					let dragDistance = 0;

					function cloneSlides() {
						const before = document.createDocumentFragment();
						const after = document.createDocumentFragment();

						originalSlides.forEach(function (slide) {
							before.appendChild(slide.cloneNode(true));
						});

						originalSlides.forEach(function (slide) {
							after.appendChild(slide.cloneNode(true));
						});

						track.insertBefore(before, track.firstChild);
						track.appendChild(after);
					}

					function measureOriginalWidth() {
						originalWidth = originalSlides.reduce(function (sum, slide) {
							return sum + slide.offsetWidth;
						}, 0);
					}

					function normalizeLoopPosition() {
						if (!originalWidth) return;

						if (slider.scrollLeft < originalWidth * 0.5) {
							slider.scrollLeft += originalWidth;
						} else if (slider.scrollLeft > originalWidth * 1.5) {
							slider.scrollLeft -= originalWidth;
						}
					}

					function initInfiniteSlider() {
						cloneSlides();
						measureOriginalWidth();
						slider.scrollLeft = originalWidth;
					}

					initInfiniteSlider();

					window.addEventListener('resize', function () {
						measureOriginalWidth();
						slider.scrollLeft = originalWidth;
					});

					slider.addEventListener('wheel', function (event) {
						if (originalWidth <= 0) return;
						event.preventDefault();

						const rawDelta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
						const delta = rawDelta * 5.4;

						slider.scrollLeft += delta;
						normalizeLoopPosition();
					}, { passive: false });

					slider.addEventListener('scroll', normalizeLoopPosition);

					slider.addEventListener('mousedown', function (event) {
						isDown = true;
						dragDistance = 0;
						slider.classList.add('is-dragging');
						startX = event.pageX - slider.offsetLeft;
						scrollLeft = slider.scrollLeft;
					});

					slider.addEventListener('mouseleave', function () {
						isDown = false;
						slider.classList.remove('is-dragging');
					});

					slider.addEventListener('mouseup', function () {
						isDown = false;
						slider.classList.remove('is-dragging');
					});

					slider.addEventListener('mousemove', function (event) {
						if (!isDown) return;
						event.preventDefault();

						const x = event.pageX - slider.offsetLeft;
						const walk = (x - startX) * 1.7;
						dragDistance = Math.max(dragDistance, Math.abs(walk));
						slider.scrollLeft = scrollLeft - walk;
						normalizeLoopPosition();
					});

					slider.addEventListener('click', function (event) {
						if (dragDistance > 8) return;

						const modelCard = event.target.closest('.image--model[data-model]');
						if (!modelCard) return;

						openModel(modelCard.dataset.model);
					});
				}

				const modelOverlay = document.querySelector('.model-overlay');
				const modelViewer = document.querySelector('.model-overlay__viewer');

				function openModel(modelPath) {
					if (!modelOverlay || !modelViewer || !modelPath) return;

					modelViewer.setAttribute('src', modelPath);
					modelOverlay.classList.add('is-open');
					modelOverlay.setAttribute('aria-hidden', 'false');
					document.body.classList.add('model-open');
				}

				function closeModel() {
					if (!modelOverlay || !modelViewer) return;

					modelOverlay.classList.remove('is-open');
					modelOverlay.setAttribute('aria-hidden', 'true');
					document.body.classList.remove('model-open');
					modelViewer.removeAttribute('src');
				}

				if (modelOverlay) {
					modelOverlay.addEventListener('click', function (event) {
						if (event.target === modelOverlay) {
							closeModel();
						}
					});
				}

				document.addEventListener('keydown', function (event) {
					if (event.key === 'Escape') closeModel();
				});

			});
		</script>
